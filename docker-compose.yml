services:
  ipam:
    build: .
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - HTTPS_PORT=8443
      - HTTP_PORT=8080
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    restart: unless-stopped

  reset:
    image: alpine
    volumes:
      - ./data:/data
    command: sh -c "rm -f /data/ipam.db /data/ipam.db-wal /data/ipam.db-shm && echo 'Database reset complete. Restart ipam service to reinitialize.'"
    profiles:
      - tools
