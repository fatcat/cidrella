services:
  cidrella:
    build:
      context: .
      args:
        DEV_TRACKING: ${DEV_TRACKING:-0}
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - HTTPS_PORT=8443
      - HTTP_PORT=8080
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DEV_TRACKING=${DEV_TRACKING:-0}
    restart: unless-stopped

  reset:
    image: alpine
    volumes:
      - ./data:/data
    command: sh -c "rm -f /data/cidrella.db /data/cidrella.db-wal /data/cidrella.db-shm && echo 'Database reset complete. Restart cidrella service to reinitialize.'"
    profiles:
      - tools
